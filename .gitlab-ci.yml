include:
  - project: 'lx-industries/gitlab-ci-templates'
    ref: 'v0.11.17'
    file: '/workflows/default.yml'
  - project: 'lx-industries/gitlab-ci-templates'
    ref: 'v0.11.17'
    file: '/jobs/docker-in-docker/Docker-In-Docker.gitlab-ci.yml'
  - project: 'lx-industries/gitlab-ci-templates'
    ref: 'v0.11.17'
    file: '/jobs/commitlint/commintlint.gitlab-ci.yml'
  - project: 'lx-industries/gitlab-ci-templates'
    ref: 'v0.11.17'
    file: '/jobs/semantic-release/semantic-release.gitlab-ci.yml'

variables:
  DOCKER_BUILD_FORCE:
    value: "false"
    description: "Force a build of the container images."
  DOCKER_PUSH_FORCE:
    value: "false"
    description: "Force the container images to be pushed to the registry even if an image with the same label exists."

stages:
  - build
  - test
  - check
  - publish
  - release

.build_with_artifacts_template: &build_with_artifacts_template
  artifacts:
    name: "${CI_PROJECT_NAME}-${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHA}"
    expire_in: 6 hr
    paths:
      - build/framework/enable.cmake
      - build/framework/bin
      - build/framework/asset
      - build/framework/lib
      - build/framework/include
      - build/plugin/*/bin
      - build/plugin/*/asset
      - build/plugin/*/lib
      - build/plugin/*/include
      - build/plugin/*/enable.cmake
      - build/plugin/html-overlay/src/android/tasks/*.java
      - build/plugin/html-overlay/src/android/webview/*.java
      - build/plugin/sensors/src/android/*.java
      - build/plugin/nodejs-worker/src/minko/file/*.java
      - build/plugin/video-camera/src/minko/video/*.java
      - build/template
      - build/cmake
      - build/test
      - LICENSE.md
      - README.md

.build_template: &build_template
  stage: build
  extends:
    - .docker-in-docker
    - .build_with_artifacts_template
  before_script:
    - mkdir -p $HOME/.docker && echo $DOCKER_AUTH_CONFIG > $HOME/.docker/config.json
    - apk add bash
  script:
    - BUILD_DIR=build bash script/build.sh $TARGET_PLATFORM release

.publish_template: &publish_template
  image: registry.aerys.in/aerys/infrastructure/vendor/rust-docker:1.72.0-1
  stage: publish
  only:
    - main
    - tags
  script:
    - PACKAGE_VERSION="main" # Default
    - PACKAGE_VERSION=$(([[ "$CI_COMMIT_TAG" ]] && echo "$CI_COMMIT_TAG") || echo "$PACKAGE_VERSION")
    - ARCHIVE_NAME="${CI_PROJECT_NAME}-${PLATFORM}-${PACKAGE_VERSION}.tar.bz2"
    - apt-get update && apt-get install -y jq
    - cd "${CI_PROJECT_DIR}"
    - tar -cjSf "/tmp/${ARCHIVE_NAME}" *
    # Publish the package.
    - 'curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "/tmp/${ARCHIVE_NAME}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/${PACKAGE_VERSION}/${ARCHIVE_NAME}"'

build:html5:
  <<: *build_template
  variables:
    TARGET_PLATFORM: html5

build:android32:
  <<: *build_template
  variables:
    TARGET_PLATFORM: android32

build:android64:
  <<: *build_template
  variables:
    TARGET_PLATFORM: android64

build:linux64_offscreen:
  <<: *build_template
  variables:
    TARGET_PLATFORM: linux64_offscreen

test:linux64_offscreen:
  stage: test
  image: registry.aerys.in/aerys/smartshape/vendor/gcc@sha256:d4a63069d9b69ca4233eecd17638356d7e01aeb66f447db5b3e606a75f527887
  dependencies:
    - build:linux64_offscreen
  artifacts:
    name: "${CI_PROJECT_NAME}-${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHA}"
    when: on_failure
    expire_in: 1 hr
    paths:
      - build/test
  before_script:
    - apt-get update
    - apt-get install -y python3-pip
    - cd ./test/websocket-server
    - pip3 install -r requirements.txt
    - python3 server.py &
    - WS_SERVER_PID=$!
    - python3 tls_server.py &
    - WSS_SERVER_PID=$!
  script:
    - cd "${CI_PROJECT_DIR}/build/test/bin"
    - ./minko-test
    - kill -SIGINT ${WS_SERVER_PID}
    - kill -SIGINT ${WSS_SERVER_PID}
    - wait

build:linux64:
  <<: *build_template
  variables:
    TARGET_PLATFORM: linux64

lint:commitlint:
  extends: .commitlint
  stage: check

check:semantic-release:
  stage: check
  extends: .semantic-release-dry-run

publish:linux64:
  <<: *publish_template
  dependencies:
    - build:linux64
  variables:
    PLATFORM: "linux-amd64-gcc-9.4"

publish:linux64_offscreen:
  <<: *publish_template
  dependencies:
    - build:linux64_offscreen
  variables:
    PLATFORM: "linux-amd64-gcc-9.4-offscreen"

publish:android32:
  <<: *publish_template
  dependencies:
    - build:android32
  variables:
    PLATFORM: "android-armeabi-v7a-r25b"

publish:android64:
  <<: *publish_template
  dependencies:
    - build:android64
  variables:
    PLATFORM: "android-arm64-v8a-r25b"

publish:html5:
  <<: *publish_template
  dependencies:
    - build:html5
  variables:
    PLATFORM: "emscripten-wasm"

release:
  stage: release
  extends: .semantic-release

# -- Dev container validation -------------------------------------------------
# Only run when the dev container definition (or this file) changes.

.devcontainer_changes: &devcontainer_changes
  # Skip tag/release pipelines: with no push diff, `changes` always matches, so
  # a semantic-release tag would otherwise rebuild the image and re-fetch the
  # schema for no reason and risk dirtying the release pipeline.
  - if: $CI_COMMIT_TAG
    when: never
  - changes:
      - .devcontainer/**/*
      - .gitlab-ci.yml

devcontainer:validate:
  stage: check
  # Use the python variant — the bare uv image has uv as its entrypoint.
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim@sha256:e5b65587bce7de595f299855d7385fe7fca39b8a74baa261ba1b7147afa78e58
  script:
    - uvx check-jsonschema --schemafile "https://raw.githubusercontent.com/devcontainers/spec/main/schemas/devContainer.schema.json" .devcontainer/devcontainer.json
  rules: *devcontainer_changes

devcontainer:build:
  stage: check
  extends: .docker-in-docker
  before_script:
    # Authenticate against registry.aerys.in so the FROM base image can be pulled.
    - mkdir -p $HOME/.docker && echo "$DOCKER_AUTH_CONFIG" > $HOME/.docker/config.json
    - docker info
  script:
    - docker build .devcontainer/
  rules: *devcontainer_changes
